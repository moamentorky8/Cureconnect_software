<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile Setup - CureConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .bg-gradient-main {
            background: linear-gradient(135deg, #218C97 0%, #59B585 100%);
        }

        .text-gradient {
            background: linear-gradient(to r, #218C97, #59B585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#F9FAFB] min-h-screen flex flex-col">

    <nav class="flex justify-between items-center px-8 py-4 bg-white shadow-sm border-b border-gray-100">
        <div class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="CureConnect Logo" class="w-10 h-10 object-contain">
            <span class="text-2xl display-font font-bold text-[#111827]">Cure<span
                    class="text-[#218C97]">Connect</span></span>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-96 h-96 bg-[#59B585]/5 blur-[120px] rounded-full"></div>

        <div
            class="bg-white w-full max-w-2xl rounded-[3rem] p-10 md:p-12 shadow-2xl border border-gray-50 relative z-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl display-font font-bold text-gradient mb-3">Patient Medical Profile</h1>
                <p class="text-gray-500 font-medium">Please provide accurate details to customize the care experience.
                </p>
            </div>

            <form action="{{ url_for('save_patient_data') }}" method="POST" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Patient Full Name</label>
                        <input type="text" name="name" required
                            class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white outline-none transition-all font-medium"
                            placeholder="Ex: Mohamed Ahmed ...">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Age</label>
                        <input type="number" name="age" required
                            class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white outline-none transition-all font-medium"
                            placeholder="Years">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Blood Type</label>
                        <select name="blood_type"
                            class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white outline-none transition-all font-medium">
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Emergency Contact Phone</label>
                        <input type="tel" name="phone" required
                            class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white outline-none transition-all font-medium"
                            placeholder="+20 1xx xxx xxxx">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Chronic Diseases
                            (Optional)</label>
                        <textarea name="diseases" rows="3"
                            class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white outline-none transition-all font-medium"
                            placeholder="Diabetes, Hypertension, etc. (Separated by commas)"></textarea>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-5 bg-gradient-main text-white font-bold rounded-[2rem] shadow-lg shadow-[#218C97]/20 hover:shadow-[#218C97]/40 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg uppercase tracking-wider">
                    Complete Profile & Go to Dashboard
                </button>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 CureConnect Health Records System.
    </footer>
</body>

</html>
