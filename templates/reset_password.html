<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CureConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .bg-gradient-main {
            background: linear-gradient(135deg, #218C97 0%, #59B585 100%);
        }

        .text-gradient {
            background: linear-gradient(to r, #218C97, #59B585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#F9FAFB] min-h-screen flex flex-col">

    <nav
        class="flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="flex items-center space-x-2">
            <img src="../logo.png" alt="CureConnect Logo" class="w-10 h-10 object-contain">
            <span class="text-2xl display-font font-bold text-[#111827]">Cure<span
                    class="text-[#218C97]">Connect</span></span>
        </div>
        <a href="index.html" class="text-sm font-semibold text-[#218C97] hover:underline transition-all">Back to
            Home</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-[#59B585]/5 blur-[100px] rounded-full">
        </div>

        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-gray-50 relative z-10">
            <div class="text-center mb-10">
                <h1 class="text-3xl display-font font-bold text-gradient mb-2">Reset Password</h1>
                <p class="text-gray-500 font-medium">Enter your email to receive recovery link</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password') }}" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-[#111827] mb-2 ml-1">Registered Email</label>
                    <input type="email" name="email" required
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white focus:ring-4 focus:ring-[#218C97]/5 outline-none transition-all font-medium"
                        placeholder="example@mail.com">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-gradient-main text-white font-bold rounded-2xl shadow-lg shadow-[#218C97]/20 hover:shadow-[#218C97]/40 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                    Send Recovery Link
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <a href="login.html"
                    class="text-[#218C97] font-bold hover:underline flex items-center justify-center gap-2">
                    <span>Back to Login</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs bg-white border-t border-gray-50">
        &copy; 2026 CureConnect System. All rights reserved.
    </footer>

</body>

</html>
