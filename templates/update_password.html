<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - CureConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .bg-gradient-main {
            background: linear-gradient(135deg, #218C97 0%, #59B585 100%);
        }

        .text-gradient {
            background: linear-gradient(to r, #218C97, #59B585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#F9FAFB] min-h-screen flex flex-col">

    <nav class="flex justify-center items-center py-6 bg-white shadow-sm border-b border-gray-100">
        <div class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="CureConnect Logo" class="w-10 h-10 object-contain">
            <span class="text-2xl display-font font-bold text-[#111827]">Cure<span
                    class="text-[#218C97]">Connect</span></span>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-[#218C97]/5 blur-[80px] rounded-full">
        </div>

        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-gray-50 relative z-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-[#59B585]/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-[#59B585]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
                <h1 class="text-3xl display-font font-bold text-gradient mb-2">Set New Password</h1>
                <p class="text-gray-500 font-medium">Choose a strong password for your account</p>
            </div>

            <form id="updatePasswordForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-[#111827] mb-2 ml-1">New Password</label>
                    <input type="password" id="newPassword" required minlength="6"
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white focus:ring-4 focus:ring-[#218C97]/5 outline-none transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-bold text-[#111827] mb-2 ml-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white focus:ring-4 focus:ring-[#218C97]/5 outline-none transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-gradient-main text-white font-bold rounded-2xl shadow-lg shadow-[#218C97]/20 hover:shadow-[#218C97]/40 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                    Update Password
                </button>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 CureConnect Security Protocol.
    </footer>

    <script>
        document.getElementById('updatePasswordForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            alert('Password updated successfully! Redirecting to login...');
            window.location.href = "login.html";
        });
    </script>
</body>

</html>
