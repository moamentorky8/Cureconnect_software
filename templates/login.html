{% extends "layout.html" %}

{% block title %}Login - CureConnect{% endblock %}

{% block content %}
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden min-h-[80vh]">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-[#59B585]/10 blur-[100px] rounded-full"></div>

    <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-gray-50 relative z-10 text-center">
        <a href="{{ url_for('index') }}"
            class="absolute top-6 left-6 text-gray-400 hover:text-[#218C97] transition flex items-center gap-2 text-xs font-bold">
            ← BACK TO HOME
        </a>

        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
            class="w-20 h-20 mx-auto mb-6 object-contain">

        <h2 class="text-3xl font-bold text-slate-800 mb-2">Welcome Back</h2>
        <p class="text-gray-400 mb-8 font-medium">Please enter your details to login</p>

        {% if error %}
        <div class="bg-red-50 text-red-500 p-4 rounded-2xl mb-6 text-sm font-bold border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-5 text-left">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 ml-1">Email</label>
                <input type="email" name="email" required
                    class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:border-[#218C97] outline-none transition-all"
                    placeholder="caregiver@cureconnect.com">
            </div>
            <div>
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400">Password</label>
                    
                    <a href="{{ url_for('reset_password') }}" 
                       class="text-[10px] font-bold text-[#59B585] hover:text-[#218C97] transition-colors hover:underline">
                       Forgot Password?
                    </a>
                </div>
                <input type="password" name="password" required
                    class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:border-[#218C97] outline-none transition-all"
                    placeholder="••••••••">
            </div>
            
            <button type="submit"
                class="w-full py-5 bg-gradient-to-r from-[#218C97] to-[#59B585] text-white font-bold rounded-2xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                Login
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-500 font-medium">
            Don't have an account? 
            <a href="{{ url_for('register') }}" 
               class="text-[#218C97] font-bold hover:underline transition-all">
               Create New Account
            </a>
        </p>
    </div>
</main>
{% endblock %}
