<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CureConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }

        .display-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .bg-gradient-main {
            background: linear-gradient(135deg, #218C97 0%, #59B585 100%);
        }

        .text-gradient {
            background: linear-gradient(to r, #218C97, #59B585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#F9FAFB] min-h-screen flex flex-col">

    <nav
        class="flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="CureConnect Logo" class="w-10 h-10 object-contain">
            <span class="text-2xl display-font font-bold text-[#111827]">Cure<span
                    class="text-[#218C97]">Connect</span></span>
        </div>
        <a href="{{ url_for('index') }}" class="text-sm font-semibold text-[#218C97] hover:underline transition-all">Back to Home</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-[#59B585]/10 blur-[100px] rounded-full"></div>

        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-gray-50 relative z-10">
            <div class="text-center mb-10">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-16 h-16 mx-auto mb-4 object-contain">
                <h1 class="text-4xl display-font font-bold text-gradient mb-2">Welcome Back</h1>
                <p class="text-gray-500 font-medium">Manage your health and medications</p>
                
                {% if error %}
                <div class="mt-4 p-3 rounded-xl bg-red-50 text-red-600 text-sm font-bold border border-red-100">
                    {{ error }}
                </div>
                {% endif %}
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-[#111827] mb-2 ml-1">Email Address</label>
                    <input type="email" name="email" id="email" required
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white focus:ring-4 focus:ring-[#218C97]/5 outline-none transition-all font-medium"
                        placeholder="moamen@cureconnect.com">
                </div>

                <div>
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="block text-sm font-bold text-[#111827]">Password</label>
                        <a href="{{ url_for('reset_password') }}"
                            class="text-xs font-bold text-[#59B585] hover:text-[#218C97] transition-colors hover:underline">Forgot?</a>
                    </div>
                    <input type="password" name="password" id="password" required
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#218C97] focus:bg-white focus:ring-4 focus:ring-[#218C97]/5 outline-none transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-gradient-main text-white font-bold rounded-2xl shadow-lg shadow-[#218C97]/20 hover:shadow-[#218C97]/40 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-8 text-sm font-medium text-gray-600">
                Don't have an account? <a href="{{ url_for('register') }}" class="text-[#218C97] font-bold hover:underline">Create one</a>
            </p>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs bg-white border-t border-gray-50">
        <div class="flex justify-center items-center space-x-2 mb-2">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-4 h-4 opacity-50">
            <span>CureConnect System</span>
        </div>
        &copy; 2026 CureConnect System. All rights reserved.
    </footer>
</body>

</html>
