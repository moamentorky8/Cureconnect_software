<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CureConnect - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .bg-medical {
            background: linear-gradient(135deg, #1eaeb4 0%, #7dc242 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .text-cure-teal { color: #1eaeb4; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full glass-card p-8 rounded-3xl shadow-2xl border border-white">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center mb-4">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="CureConnect Logo" class="h-24 w-auto">
            </div>
            <h1 class="text-3xl font-bold text-teal-700 tracking-tight">CureConnect</h1>
            <p class="text-slate-500 mt-2 text-sm font-medium">نظامك الذكي لإدارة الأدوية</p>
        </div>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-5 text-center border border-red-100">
            <i class="fa-solid fa-circle-exclamation ml-1"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
            <div>
                <label class="block text-slate-700 text-sm font-bold mb-2 mr-1">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required
                        class="w-full pr-10 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition"
                        placeholder="example@mail.com">
                </div>
            </div>

            <div>
                <label class="block text-slate-700 text-sm font-bold mb-2 mr-1">كلمة المرور</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required
                        class="w-full pr-10 pl-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs text-slate-500 px-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="accent-teal-600"> تذكرني
                </label>
                <a href="{{ url_for('reset_password') }}" class="hover:text-teal-600 transition">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" 
                class="w-full bg-medical text-white py-4 rounded-xl font-bold shadow-lg hover:shadow-teal-200 hover:scale-[1.02] active:scale-95 transition duration-200 flex items-center justify-center gap-2">
                <span>دخول للنظام</span>
                <i class="fa-solid fa-arrow-left"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-slate-500 text-sm">ليس لديك حساب؟ 
                <a href="{{ url_for('register') }}" class="text-teal-600 font-bold hover:underline">أنشئ حساباً جديداً</a>
            </p>
        </div>
    </div>

</body>
</html>
