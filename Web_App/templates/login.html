<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CureConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .display-font { font-family: 'Space_Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex flex-col">

    <nav class="flex justify-between items-center px-8 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="flex items-center space-x-2">
            <div class="w-10 h-10 bg-gradient-to-tr from-[#990FFA] to-[#E60076] rounded-xl flex items-center justify-center shadow-lg">
                <span class="text-white font-bold text-xl">C</span>
            </div>
            <span class="text-2xl display-font font-bold text-[#111827]">Cure<span class="text-[#990FFA]">Connect</span></span>
        </div>
        <a href="index.html" class="text-sm font-semibold text-[#990FFA] hover:underline">Back to Home</a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-gray-50">
            <div class="text-center mb-10">
                <h1 class="text-4xl display-font font-bold bg-gradient-to-r from-[#990FFA] to-[#E60076] bg-clip-text text-transparent mb-2">Welcome Back</h1>
                <p class="text-gray-500 font-medium">Manage your health and medications</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-[#111827] mb-2 ml-1">Email Address</label>
                    <input type="email" id="email" required 
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#990FFA] focus:bg-white focus:ring-4 focus:ring-[#990FFA]/5 outline-none transition-all" 
                        placeholder="moamen@cureconnect.com">
                </div>

                <div>
                    <div class="flex justify-between mb-2 ml-1">
                        <label class="block text-sm font-bold text-[#111827]">Password</label>
                        <a href="#" class="text-xs font-bold text-[#E60076] hover:underline">Forgot?</a>
                    </div>
                    <input type="password" id="password" required 
                        class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-[#990FFA] focus:bg-white focus:ring-4 focus:ring-[#990FFA]/5 outline-none transition-all" 
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full py-4 bg-gradient-to-r from-[#990FFA] to-[#E60076] text-white font-bold rounded-2xl shadow-lg shadow-[#990FFA]/20 hover:shadow-[#990FFA]/40 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-8 text-sm font-medium text-gray-600">
                Don't have an account? <a href="#" class="text-[#990FFA] font-bold hover:underline">Create one</a>
            </p>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 CureConnect System. All rights reserved.
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // هنا هتحط كود الـ Firebase Auth اللي بيكلم السيرفر
            console.log("Attempting to login...");
        });
    </script>
</body>
</html>
